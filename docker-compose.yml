services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_API_URL=${NEXT_PUBLIC_BACKEND_API_URL:-https://badminton5gear.win}
    container_name: badminton_app
    ports:
      - '3000:3000'
    ulimits:
      nofile:
        soft: 65535
        hard: 65535    
    environment:
      - NODE_ENV=production
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=P@ssw0rd
      - SESSION_SECRET=hwFzVaxm4rwUdjioyx+rwJWrThKiVRVR/XN+5+r26O4=
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - badminton_net
    restart: unless-stopped

  cloudflare:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare_tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - badminton_net

networks:
  badminton_net:
    driver: bridge
